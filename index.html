<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Customer FAQ Portal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Customer FAQ Portal</h1>

<input type="text" id="searchBox" placeholder="Search FAQs..." onkeyup="filterFAQs()">

<div class="filters">
  <select id="legalFilter" onchange="filterFAQs()">
    <option value="">Legal Type</option>
  </select>

  <select id="testFilter" onchange="filterFAQs()">
    <option value="">Test Type</option>
  </select>

  <select id="categoryFilter" onchange="filterFAQs()">
    <option value="">Category</option>
  </select>
</div>

<div id="faqContainer"></div>

<script src="faq-data.js"></script>

</body>
</html>
